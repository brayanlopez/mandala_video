<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandala Animada</title>

    <!--
    Content Security Policy:
    - Todas las librerías se sirven localmente desde /lib/ (node_modules)
    - Sin dependencias de CDN externas en runtime
    - script-src: solo 'self' — sin CDN, sin eval(), sin inline
  -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
          default-src 'self';
          script-src  'self';
          style-src   'self' 'unsafe-inline';
          img-src     'self' blob: data:;
          media-src   blob:;
          connect-src 'self';
          object-src  'none';
        "
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ── Header ─────────────────────────────────────────────────────────── -->
      <header>
        <h1>🌸 Mandala Animada</h1>
        <span class="tag">p5.js + CCapture</span>
      </header>

      <!-- ── Canvas ─────────────────────────────────────────────────────────── -->
      <div class="canvas-area">
        <div id="canvas-container"></div>

        <div class="export-overlay" id="export-overlay">
          <div class="spinner"></div>
          <div class="export-overlay-text">Exportando video…</div>
        </div>
      </div>

      <!-- ── Controles ──────────────────────────────────────────────────────── -->
      <div class="controls">
        <div class="control-group">
          <button class="btn primary" id="btn-play" disabled>
            ▶ Reproducir
          </button>
          <button class="btn" id="btn-reset" disabled>↺ Reiniciar</button>
        </div>

        <div class="sep"></div>

        <div class="control-group">
          <label for="speed-slider">Velocidad</label>
          <input
            type="range"
            id="speed-slider"
            min="0.2"
            max="3"
            step="0.1"
            value="1.0"
          />
          <span id="speed-label">1.0×</span>
        </div>

        <div class="sep"></div>

        <div class="control-group">
          <label for="effect-select">Efecto entrada</label>
          <select id="effect-select">
            <option value="scaleIn" selected>Scale In</option>
            <option value="fadeIn">Fade In</option>
            <option value="spinIn">Spin In</option>
            <option value="flyIn">Fly In</option>
          </select>
        </div>

        <div class="sep"></div>

        <div class="control-group">
          <button class="btn" id="btn-export" disabled>⬇ Exportar WebM</button>
        </div>

        <div class="sep"></div>

        <!-- ── Selector de patrón de mandala ──────────────────────────────── -->
        <!-- Las opciones se generan dinámicamente desde PATTERN_REGISTRY en main.js -->
        <div class="control-group">
          <label for="pattern-select">Patrón</label>
          <select
            id="pattern-select"
            title="Seleccionar tipo de mandala"
          ></select>
        </div>

        <div class="sep"></div>

        <!-- ── Color de fondo ─────────────────────────────────────────────── -->
        <div class="control-group">
          <label for="bg-color-input">Fondo</label>
          <input
            type="color"
            id="bg-color-input"
            value="#1a0a2e"
            title="Color de fondo del canvas"
          />
        </div>

        <div class="sep"></div>

        <!-- ── Velocidad de rotación continua ────────────────────────────── -->
        <div class="control-group">
          <label for="rotation-slider">Rotación</label>
          <input
            type="range"
            id="rotation-slider"
            min="0"
            max="0.15"
            step="0.005"
            value="0.04"
          />
          <span class="val-label" id="rotation-label">0.04</span>
        </div>

        <div class="sep"></div>

        <!-- ── Stagger entre imágenes ─────────────────────────────────────── -->
        <div class="control-group">
          <label for="stagger-slider">Stagger</label>
          <input
            type="range"
            id="stagger-slider"
            min="0"
            max="500"
            step="10"
            value="160"
          />
          <span class="val-label" id="stagger-label">160ms</span>
        </div>

        <div class="sep"></div>

        <!-- ── Duración del efecto de entrada ────────────────────────────── -->
        <div class="control-group">
          <label for="duration-slider">Entrada</label>
          <input
            type="range"
            id="duration-slider"
            min="200"
            max="2000"
            step="50"
            value="700"
          />
          <span class="val-label" id="duration-label">700ms</span>
        </div>

        <div class="sep"></div>

        <!-- ── Loop ──────────────────────────────────────────────────────── -->
        <div class="control-group">
          <label for="loop-checkbox">Loop</label>
          <input type="checkbox" id="loop-checkbox" />
        </div>

        <div class="sep"></div>

        <!-- ── FPS de exportación ─────────────────────────────────────────── -->
        <div class="control-group">
          <label for="fps-select">FPS</label>
          <select id="fps-select" title="Cuadros por segundo al exportar">
            <option value="30">30</option>
            <option value="60" selected>60</option>
          </select>
        </div>

        <div class="sep"></div>

        <!-- ── Modo de captura ───────────────────────────────────────────── -->
        <div class="control-group">
          <label for="capture-select">Captura</label>
          <select id="capture-select" title="Motor de captura de video">
            <option value="ccapture" selected>CCapture</option>
            <option value="mediarecorder">MediaRecorder</option>
          </select>
        </div>

        <div class="status-area">
          <span id="status-text">Iniciando…</span>
          <div id="progress-wrap">
            <div id="progress-bar"></div>
          </div>
        </div>
      </div>

      <!-- ── Nota ffmpeg ─────────────────────────────────────────────────────── -->
      <div class="ffmpeg-note">
        Para convertir el WebM a MP4 Full HD:
        <code
          >ffmpeg -i mandala.webm -c:v libx264 -crf 17 -pix_fmt yuv420p
          mandala_1080p.mp4</code
        >
      </div>
    </div>
    <!-- .app -->

    <!--
  ── Librerías locales (servidas desde node_modules vía server.js) ─────────

  p5.js v1.9.4       → node_modules/p5/lib/p5.min.js
  CCapture.js v1.1.0 → node_modules/ccapture.js/build/CCapture.all.min.js

  Servir desde mismo origen ('self') es más seguro que CDN externo:
  no hay riesgo de supply-chain attack ni dependencia de terceros en runtime.
  Las versiones están fijadas en package.json.
-->
    <script src="lib/p5.min.js"></script>
    <script src="lib/CCapture.all.min.js"></script>

    <!-- Módulo principal (ES modules) -->
    <!-- Los event listeners para mandala:ready / export-start / export-end
     están en main.js para cumplir con la CSP (sin scripts inline). -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
